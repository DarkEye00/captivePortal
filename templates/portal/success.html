<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connected</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        .check { font-size: 48px; margin-bottom: 16px; }
        h2 { color: #1a1a2e; margin-bottom: 8px; }
        p { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">✅</div>
        <h2>You're connected!</h2>
        <p>Welcome, {{ username }}. You now have internet access.</p>
    </div>
</body>
</html>
